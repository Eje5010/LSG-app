<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSG Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon-512.png">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <h1>Lansdale Small Group Portal</h1>
            <div class="nav-controls">
                <div class="theme-container">
                    <span class="theme-label">Dark Mode</span>
                    <label class="theme-switch">
                        <input type="checkbox" id="theme-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <button id="adminBtn" class="ui-btn" onclick="window.openAdmin()">Admin</button>
            </div>
        </div>
    </nav>

    <nav class="bottom-nav">
        <div class="nav-inner">
            <button onclick="window.setPage('studies')" id="nav-studies">📖 Study</button>
            <button onclick="window.setPage('prayers')" id="nav-prayers" style="position: relative;">
                🙏 Prayers <span id="prayer-dot" class="notification-dot" style="display: none;"></span>
            </button>
            <button onclick="window.setPage('learnings')" id="nav-learnings" style="position: relative;">
                💡 Learning <span id="learning-dot" class="notification-dot" style="display: none;"></span>
            </button>
            <button onclick="window.setPage('meals')" id="nav-meals">🍲 Meals</button>
        </div>
    </nav>

    <main id="app">
        <div id="view-studies" class="page-view" style="display: block;">
            <section class="archive-selector no-print admin-only">
                <div class="card" style="border: 2px dashed var(--btn); margin-bottom: 20px; background: rgba(52, 152, 219, 0.05);">
                    <h4 style="margin:0 0 10px 0; color: var(--btn);">Admin: Study Manager</h4>
                    <select id="study-date"></select>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button id="editStudyBtn" class="ui-btn">✏️ Edit Current</button>
                        <button onclick="window.openNewStudyModal()" class="ui-btn" style="background:#27ae60; color:white;">➕ New Week</button>
                    </div>
                </div>
            </section>

            <div id="study-content">
                <section class="card"><h2>Passages</h2>
