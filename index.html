<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSG Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon-512.png">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">
</head>
<body>
    <nav class="navbar">
        <h1>Lansdale Small Group Portal</h1>
        <div class="nav-controls">
            <div class="theme-container">
                <span class="theme-label">Dark Mode</span>
                <label class="theme-switch">
                    <input type="checkbox" id="theme-toggle">
                    <span class="slider"></span>
                </label>
            </div>
            <button id="adminBtn" class="ui-btn" onclick="window.openAdmin()">Admin</button>
        </div>
    </nav>

    <nav class="bottom-nav">
        <button onclick="window.setPage('studies')" id="nav-studies">📖 Study</button>
        <button onclick="window.setPage('prayers')" id="nav-prayers" style="position: relative;">
            🙏 Prayers <span id="prayer-dot" class="notification-dot" style="display: none;"></span>
        </button>
        <button onclick="window.setPage('learnings')" id="nav-learnings" style="position: relative;">
            💡 Learning <span id="learning-dot" class="notification-dot" style="display: none;"></span>
        </button>
        <button onclick="window.setPage('meals')" id="nav-meals">🍲 Meals</button>
    </nav>

    <main id="app">
        <div id="view-studies" class="page-view">
            <section class="archive-selector no-print">
                <select id="study-date"></select>
                <button onclick="window.shareStudy()" class="ui-btn share-btn">🔗 Share</button>
                <button id="editStudyBtn" class="admin-only ui-btn">✏️ Edit</button>
                <button onclick="window.openNewStudyModal()" class="admin-only ui-btn" style="background:#27ae60; color:white;">➕ New</button>
            </section>

            <div id="study-content">
                <section class="card">
                    <h2>Passages</h2>
                    <div id="passage-text"></div>
                </section>
                <section class="card">
                    <h2>Activity</h2>
                    <p id="activity-desc"></p>
                </section>
                <section id="study-meal-card" class="card" style="display:none;">
                    <h2>Wednesday Meal</h2>
                    <div id="study-meal-info"></div>
                </section>
                <section class="card">
                    <h2>Worship Lyrics</h2>
                    <pre id="lyrics-container"></pre>
                </section>
            </div>
        </div>

        <div id="view-prayers" class="page-view" style="display:none;">
            <section class="card">
                <h2>Prayer Wall</h2>
                <div id="prayer-list"></div>
                <button id="loadMorePrayers" onclick="window.loadMorePrayers()"
